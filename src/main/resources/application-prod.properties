spring.application.name=BookWhiz

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Database (MySQL - Aiven)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# Redis (Upstash)
# ===============================
spring.cache.type=redis
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=true

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:bookwhiz_super_secure_jwt_secret_key_256_bits_long}
jwt.expiration=86400000

# ===============================
# Mail
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
bookwhiz.mail.from=BookWhiz <iamvigneshofficial@gmail.com>

# ===============================
# File Upload
# ===============================
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.upload.dir=uploads/posters
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN